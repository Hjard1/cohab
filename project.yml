name: Cohab
options:
  bundleIdPrefix: com.cohab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Cohab:
    type: application
    platform: iOS
    sources:
      - Cohab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cohab.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO
